name: solarzap

services:
  web:
    container_name: solarzap-web
    image: solarzap-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_EVOLUTION_API_URL: ${VITE_EVOLUTION_API_URL}
    environment:
      SOLARZAP_DOMAINS: ${SOLARZAP_DOMAINS}
      CADDY_EMAIL: ${CADDY_EMAIL}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
